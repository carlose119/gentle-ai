version: 2

project_name: gentle-ai

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/gentle-ai
    binary: gentle-ai
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - docs/review-integration.md
      - contracts/review-integration/v1/schemas/*.schema.json
      - contracts/review-integration/v1/fixtures/*.fixture.json

checksum:
  name_template: "checksums.txt"

# signs: signs the checksum file with minisign.
#
# Environment contract (see README "Release verification"):
#   MINISIGN_SECRET_KEY_FILE  absolute path to an UNPROTECTED minisign
#                             secret key file. Stock minisign prompts for a
#                             passphrase on stdin; CI runners are non-interactive,
#                             so the maintainer MUST generate this key with
#                               minisign -G -W -p public.key -s secret.key
#                             (the -W flag disables the passphrase).
#   release.yml materializes the key from base64 into this path before GoReleaser runs.
signs:
  - cmd: minisign
    artifacts: checksum
    signature: ${artifact}.minisig
    args:
      - "-S"
      - "-s"
      - "{{ .Env.MINISIGN_SECRET_KEY_FILE }}"
      - "-m"
      - "{{ .ArtifactName }}"
      - "-c"
      - "gentle-ai {{ .Version }}"
      - "-t"
      - "signed by gentle-ai release"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: Gentleman-Programming
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    name: gentle-ai
    homepage: "https://github.com/Gentleman-Programming/gentle-ai"
    description: "Gentle-AI — Ecosystem, Frameworks, Workflows for AI coding agents."
    license: "MIT"
    commit_msg_template: "chore: update gentle-ai formula to {{ .Tag }}"

scoops:
  - repository:
      owner: Gentleman-Programming
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: gentle-ai
    homepage: "https://github.com/Gentleman-Programming/gentle-ai"
    description: "Gentle-AI — Ecosystem, Frameworks, Workflows for AI coding agents."
    license: MIT
    commit_msg_template: "chore: update gentle-ai to {{ .Tag }}"
